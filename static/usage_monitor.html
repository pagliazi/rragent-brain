<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw - API Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwindcss.config={darkMode:'class',theme:{extend:{
  fontFamily:{sans:['Inter','-apple-system','BlinkMacSystemFont','system-ui','sans-serif']},
  colors:{
    brand:{50:'#eef2ff',100:'#e0e7ff',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca'},
    surface:{0:'#0a0a0f',1:'#111118',2:'#1a1a24',3:'#252530',4:'#32323f',5:'#3e3e4d'},
    border:{DEFAULT:'#252530',light:'#32323f'},
  },
}}}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#0a0a0f;color:#e4e4e7;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#32323f;border-radius:3px}
.card{background:#111118;border:1px solid #252530;border-radius:12px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#32323f}
.glow{box-shadow:0 0 20px rgba(99,102,241,.08)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .4s ease-out}
.provider-bailian{color:#818cf8}.provider-siliconflow{color:#34d399}.provider-deepseek{color:#60a5fa}
.provider-dashscope{color:#fbbf24}.provider-openai{color:#f472b6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

const PROVIDER_COLORS = {
  bailian: {bg:'rgba(129,140,248,0.15)', border:'#818cf8', text:'#818cf8'},
  siliconflow: {bg:'rgba(52,211,153,0.15)', border:'#34d399', text:'#34d399'},
  deepseek: {bg:'rgba(96,165,250,0.15)', border:'#60a5fa', text:'#60a5fa'},
  dashscope: {bg:'rgba(251,191,36,0.15)', border:'#fbbf24', text:'#fbbf24'},
  openai: {bg:'rgba(244,114,182,0.15)', border:'#f472b6', text:'#f472b6'},
};

const TASK_COLORS = {
  brief:'#818cf8', analysis:'#34d399', code:'#60a5fa', default:'#a78bfa', create_llm:'#fb923c',
};

const MODEL_COLORS = [
  '#818cf8','#34d399','#60a5fa','#fbbf24','#f472b6','#fb923c',
  '#a78bfa','#2dd4bf','#f87171','#38bdf8','#e879f9','#4ade80',
];

function formatNumber(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}

function StatCard({title, value, sub, icon, color}) {
  return (
    <div className="card glow animate-in">
      <div className="flex items-start justify-between">
        <div>
          <p className="text-xs text-zinc-500 uppercase tracking-wider mb-1">{title}</p>
          <p className="text-2xl font-bold" style={{color: color || '#e4e4e7'}}>{value}</p>
          {sub && <p className="text-xs text-zinc-500 mt-1">{sub}</p>}
        </div>
        <div className="text-2xl opacity-40">{icon}</div>
      </div>
    </div>
  );
}

function DailyChart({daily}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !daily.length) return;
    const sorted = [...daily].sort((a,b) => a.date.localeCompare(b.date));
    const labels = sorted.map(d => d.date.slice(5));
    const calls = sorted.map(d => d.calls);
    const tokens = sorted.map(d => d.total_tokens);
    const cost = sorted.map(d => d.cost_yuan);

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {label: '调用次数', data: calls, backgroundColor: 'rgba(129,140,248,0.6)', borderColor: '#818cf8', borderWidth: 1, yAxisID: 'y', borderRadius: 4, order: 2},
          {label: '费用 (元)', data: cost, type: 'line', borderColor: '#f472b6', backgroundColor: 'rgba(244,114,182,0.1)', fill: true, tension: 0.3, pointRadius: 3, yAxisID: 'y1', order: 1},
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {legend: {labels: {color: '#a1a1aa', font: {size: 11}}}},
        scales: {
          x: {grid: {color: '#1a1a24'}, ticks: {color: '#71717a', font: {size: 10}}},
          y: {position: 'left', grid: {color: '#1a1a24'}, ticks: {color: '#71717a'}, title: {display: true, text: '调用次数', color: '#71717a'}},
          y1: {position: 'right', grid: {drawOnChartArea: false}, ticks: {color: '#f472b6'}, title: {display: true, text: '费用 (元)', color: '#f472b6'}},
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [daily]);

  return <canvas ref={canvasRef}/>;
}

function ProviderChart({byProvider}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const names = Object.keys(byProvider);
    if (!names.length) return;
    const data = names.map(n => byProvider[n].calls || 0);
    const colors = names.map(n => PROVIDER_COLORS[n]?.border || '#71717a');

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {labels: names, datasets: [{data, backgroundColor: colors.map(c => c + '33'), borderColor: colors, borderWidth: 2}]},
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: {legend: {position: 'bottom', labels: {color: '#a1a1aa', padding: 12, font: {size: 11}}}}
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [byProvider]);

  return <canvas ref={canvasRef}/>;
}

function ModelChart({byModel}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const entries = Object.entries(byModel).sort((a,b) => (b[1].calls||0)-(a[1].calls||0));
    if (!entries.length) return;
    const names = entries.map(([n]) => n);
    const data = entries.map(([,d]) => d.calls || 0);
    const colors = names.map((_, i) => MODEL_COLORS[i % MODEL_COLORS.length]);

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {labels: names, datasets: [{data, backgroundColor: colors.map(c => c + '44'), borderColor: colors, borderWidth: 2}]},
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {legend: {position: 'right', labels: {color: '#a1a1aa', padding: 8, font: {size: 10}, boxWidth: 12}}}
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [byModel]);

  return <canvas ref={canvasRef}/>;
}

function ModelTable({byModel, totals}) {
  const models = Object.entries(byModel).sort((a,b) => (b[1].calls||0)-(a[1].calls||0));
  return (
    <div className="overflow-x-auto max-h-[260px] overflow-y-auto">
      <table className="w-full text-xs">
        <thead className="sticky top-0 bg-surface-1 z-10">
          <tr className="text-zinc-500 uppercase">
            <th className="text-left py-1.5 px-2">Model</th>
            <th className="text-right py-1.5 px-2">Calls</th>
            <th className="text-right py-1.5 px-2">Tokens</th>
            <th className="text-right py-1.5 px-2">Cost</th>
          </tr>
        </thead>
        <tbody>
          {models.map(([name, d], i) => {
            const color = MODEL_COLORS[i % MODEL_COLORS.length];
            return (
              <tr key={name} className="border-t border-surface-3 hover:bg-surface-2 transition-colors">
                <td className="py-1.5 px-2">
                  <span className="inline-flex items-center gap-1.5">
                    <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: color}}/>
                    <span className="text-zinc-200 font-medium truncate max-w-[180px]">{name}</span>
                  </span>
                </td>
                <td className="text-right py-1.5 px-2 tabular-nums text-zinc-300">{formatNumber(d.calls||0)}</td>
                <td className="text-right py-1.5 px-2 tabular-nums text-zinc-400">{formatNumber(d.tokens||0)}</td>
                <td className="text-right py-1.5 px-2 tabular-nums text-rose-400">{(d.cost_yuan||0).toFixed(4)}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
      {!models.length && <p className="text-center text-zinc-600 py-6 text-xs">No model data</p>}
    </div>
  );
}

function TokenChart({daily}) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !daily.length) return;
    const sorted = [...daily].sort((a,b) => a.date.localeCompare(b.date));
    const labels = sorted.map(d => d.date.slice(5));
    const prompt = sorted.map(d => d.prompt_tokens || 0);
    const completion = sorted.map(d => d.completion_tokens || 0);

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {label: 'Prompt Tokens', data: prompt, backgroundColor: 'rgba(96,165,250,0.6)', borderRadius: 4, stack: 'tokens'},
          {label: 'Completion Tokens', data: completion, backgroundColor: 'rgba(52,211,153,0.6)', borderRadius: 4, stack: 'tokens'},
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {legend: {labels: {color: '#a1a1aa', font: {size: 11}}}},
        scales: {
          x: {stacked: true, grid: {color: '#1a1a24'}, ticks: {color: '#71717a', font: {size: 10}}},
          y: {stacked: true, grid: {color: '#1a1a24'}, ticks: {color: '#71717a'}, title: {display: true, text: 'Tokens', color: '#71717a'}},
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [daily]);

  return <canvas ref={canvasRef}/>;
}

function ProviderTable({byProvider, totals}) {
  const providers = Object.entries(byProvider).sort((a,b) => (b[1].calls||0)-(a[1].calls||0));
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead>
          <tr className="text-zinc-500 text-xs uppercase">
            <th className="text-left py-2 px-3">Provider</th>
            <th className="text-right py-2 px-3">Calls</th>
            <th className="text-right py-2 px-3">Tokens</th>
            <th className="text-right py-2 px-3">Cost</th>
            <th className="text-right py-2 px-3">%</th>
          </tr>
        </thead>
        <tbody>
          {providers.map(([name, d]) => {
            const pct = totals.calls > 0 ? ((d.calls / totals.calls) * 100).toFixed(1) : '0';
            const c = PROVIDER_COLORS[name] || {text:'#a1a1aa', bg:'rgba(161,161,170,0.1)'};
            return (
              <tr key={name} className="border-t border-surface-3 hover:bg-surface-2 transition-colors">
                <td className="py-2 px-3">
                  <span className="inline-flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full" style={{background: c.border}}/>
                    <span style={{color: c.text}} className="font-medium">{name}</span>
                  </span>
                </td>
                <td className="text-right py-2 px-3 tabular-nums">{formatNumber(d.calls||0)}</td>
                <td className="text-right py-2 px-3 tabular-nums">{formatNumber(d.tokens||0)}</td>
                <td className="text-right py-2 px-3 tabular-nums text-rose-400">{(d.cost_yuan||0).toFixed(4)}</td>
                <td className="text-right py-2 px-3">
                  <div className="flex items-center justify-end gap-2">
                    <div className="w-16 h-1.5 rounded-full bg-surface-4 overflow-hidden">
                      <div className="h-full rounded-full" style={{width: pct+'%', background: c.border}}/>
                    </div>
                    <span className="text-zinc-500 text-xs w-10 text-right">{pct}%</span>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

const CALLER_LABELS = {
  orchestrator:'Orchestrator', analysis_agent:'Analysis', news_agent:'News',
  dev_agent:'Dev', browser_agent:'Browser', quant_pipeline:'Quant',
  strategist_agent:'Strategy', telegram_agent:'TG Agent', create_llm:'Direct',
  llm_router:'Router',
};
const CALLER_COLORS = {
  orchestrator:'#818cf8', analysis_agent:'#34d399', news_agent:'#60a5fa',
  quant_pipeline:'#fbbf24', strategist_agent:'#e879f9', telegram_agent:'#fb923c',
  dev_agent:'#2dd4bf', browser_agent:'#f472b6', llm_router:'#a78bfa', create_llm:'#71717a',
};

function RecentTable({records, filter, onFilterChange}) {
  const filtered = records.filter(r => {
    if (filter.provider && r.provider !== filter.provider) return false;
    if (filter.model && r.model !== filter.model) return false;
    if (filter.caller && r.caller !== filter.caller) return false;
    if (filter.success !== '' && String(r.success) !== filter.success) return false;
    return true;
  });

  const providers = [...new Set(records.map(r => r.provider).filter(Boolean))];
  const models = [...new Set(records.map(r => r.model).filter(Boolean))];
  const callers = [...new Set(records.map(r => r.caller).filter(Boolean))];

  return (
    <div>
      {/* Filters */}
      <div className="flex flex-wrap gap-2 mb-3">
        <select value={filter.provider} onChange={e => onFilterChange({...filter, provider: e.target.value})}
          className="bg-surface-2 border border-border rounded-lg px-2 py-1 text-xs text-zinc-300 focus:outline-none focus:border-brand-500">
          <option value="">All Providers</option>
          {providers.map(p => <option key={p} value={p}>{p}</option>)}
        </select>
        <select value={filter.model} onChange={e => onFilterChange({...filter, model: e.target.value})}
          className="bg-surface-2 border border-border rounded-lg px-2 py-1 text-xs text-zinc-300 focus:outline-none focus:border-brand-500">
          <option value="">All Models</option>
          {models.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <select value={filter.caller} onChange={e => onFilterChange({...filter, caller: e.target.value})}
          className="bg-surface-2 border border-border rounded-lg px-2 py-1 text-xs text-zinc-300 focus:outline-none focus:border-brand-500">
          <option value="">All Sources</option>
          {callers.map(c => <option key={c} value={c}>{CALLER_LABELS[c]||c}</option>)}
        </select>
        <select value={filter.success} onChange={e => onFilterChange({...filter, success: e.target.value})}
          className="bg-surface-2 border border-border rounded-lg px-2 py-1 text-xs text-zinc-300 focus:outline-none focus:border-brand-500">
          <option value="">All Status</option>
          <option value="true">Success</option>
          <option value="false">Failed</option>
        </select>
        {(filter.provider || filter.model || filter.caller || filter.success !== '') && (
          <button onClick={() => onFilterChange({provider:'',model:'',caller:'',success:''})}
            className="px-2 py-1 rounded-lg text-xs text-zinc-500 hover:text-zinc-300 border border-border hover:border-zinc-500 transition-colors">
            Clear
          </button>
        )}
        <span className="ml-auto text-xs text-zinc-600 self-center">{filtered.length} / {records.length}</span>
      </div>

      {/* Table */}
      <div className="overflow-x-auto max-h-[520px] overflow-y-auto rounded-lg border border-border">
        <table className="w-full text-xs">
          <thead className="sticky top-0 bg-surface-2 z-10">
            <tr className="text-zinc-500 uppercase text-[10px] tracking-wider">
              <th className="text-left py-2.5 px-3 font-semibold">Date / Time</th>
              <th className="text-left py-2.5 px-3 font-semibold">Source</th>
              <th className="text-left py-2.5 px-3 font-semibold">Provider</th>
              <th className="text-left py-2.5 px-3 font-semibold">Model</th>
              <th className="text-left py-2.5 px-3 font-semibold">Task</th>
              <th className="text-right py-2.5 px-3 font-semibold">Tokens</th>
              <th className="text-right py-2.5 px-3 font-semibold">Cost</th>
              <th className="text-right py-2.5 px-3 font-semibold">Latency</th>
              <th className="text-center py-2.5 px-3 font-semibold">Status</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((r, i) => {
              const c = PROVIDER_COLORS[r.provider] || {text:'#a1a1aa'};
              const dt = r.ts ? new Date(r.ts) : null;
              const dateStr = dt ? dt.toLocaleDateString('zh-CN', {month:'2-digit', day:'2-digit'}) : '-';
              const timeStr = dt ? dt.toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '';
              const callerLabel = CALLER_LABELS[r.caller] || r.caller || '-';
              const callerColor = CALLER_COLORS[r.caller] || '#71717a';
              return (
                <tr key={i} className="border-t border-surface-3 hover:bg-surface-2/50 transition-colors group">
                  <td className="py-2 px-3">
                    <div className="flex flex-col">
                      <span className="text-zinc-300 tabular-nums">{dateStr}</span>
                      <span className="text-zinc-600 tabular-nums text-[10px]">{timeStr}</span>
                    </div>
                  </td>
                  <td className="py-2 px-3">
                    <span className="inline-flex items-center gap-1.5 px-1.5 py-0.5 rounded-md text-[10px] font-semibold"
                      style={{background: callerColor + '18', color: callerColor}}>
                      {callerLabel}
                    </span>
                  </td>
                  <td className="py-2 px-3 font-medium" style={{color: c.text}}>{r.provider}</td>
                  <td className="py-2 px-3 text-zinc-300 max-w-[140px] truncate">{r.model}</td>
                  <td className="py-2 px-3">
                    <span className="px-1.5 py-0.5 rounded text-[10px] font-medium"
                      style={{background: (TASK_COLORS[r.task_type]||'#71717a')+'22', color: TASK_COLORS[r.task_type]||'#71717a'}}>
                      {r.task_type}
                    </span>
                  </td>
                  <td className="text-right py-2 px-3">
                    <div className="flex flex-col items-end">
                      <span className="text-zinc-200 tabular-nums font-medium">{formatNumber((r.prompt_tokens||0)+(r.completion_tokens||0))}</span>
                      <span className="text-[10px] text-zinc-600 tabular-nums">
                        <span className="text-blue-500">{formatNumber(r.prompt_tokens||0)}</span>
                        {' / '}
                        <span className="text-emerald-500">{formatNumber(r.completion_tokens||0)}</span>
                      </span>
                    </div>
                  </td>
                  <td className="text-right py-2 px-3 tabular-nums text-rose-400 font-medium">
                    ¥{(r.cost_yuan||0).toFixed(4)}
                  </td>
                  <td className="text-right py-2 px-3 tabular-nums text-zinc-400">
                    {r.latency_ms ? (r.latency_ms/1000).toFixed(1)+'s' : '-'}
                  </td>
                  <td className="text-center py-2 px-3">
                    {r.success
                      ? <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-500/10 text-emerald-400 text-[11px]">&#10003;</span>
                      : <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-red-500/10 text-red-400 text-[11px]">&#10007;</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {!filtered.length && <p className="text-center text-zinc-600 py-10 text-sm">No matching records</p>}
      </div>
    </div>
  );
}

function RouterStatus({status}) {
  if (!status) return null;
  const rl = status.rate_limits || {};
  return (
    <div className="space-y-3">
      <div className="flex items-center gap-2 text-xs text-zinc-500">
        <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"/>
        <span>{status.mode}</span>
      </div>
      {status.pinned && (
        <div className="text-xs px-2 py-1 rounded bg-brand-500/10 text-brand-400 inline-block">
          Pinned: {status.pinned.provider}/{status.pinned.model}
        </div>
      )}
      <div className="grid grid-cols-2 gap-2 text-xs">
        {(status.available_providers||[]).map(p => {
          const c = PROVIDER_COLORS[p] || {text:'#a1a1aa', bg:'rgba(161,161,170,0.1)'};
          const limited = rl[p] && (rl[p].retry_after > 0 || rl[p].consecutive_failures >= 3);
          return (
            <div key={p} className="flex items-center gap-2 px-2 py-1.5 rounded-lg bg-surface-2">
              <span className={`w-1.5 h-1.5 rounded-full ${limited ? 'bg-red-400' : 'bg-emerald-400'}`}/>
              <span style={{color: c.text}} className="font-medium">{p}</span>
              {limited && <span className="text-red-400 text-[10px]">limited</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const [days, setDays] = useState(14);
  const [logFilter, setLogFilter] = useState({provider:'',model:'',caller:'',success:''});

  const fetchData = useCallback(async () => {
    try {
      const resp = await fetch(`/api/usage?days=${days}&recent=200`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();
      setData(json);
      setError(null);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [days]);

  useEffect(() => {
    fetchData();
    if (!autoRefresh) return;
    const id = setInterval(fetchData, 30000);
    return () => clearInterval(id);
  }, [fetchData, autoRefresh]);

  if (loading && !data) return (
    <div className="flex items-center justify-center h-screen">
      <div className="text-center">
        <div className="w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"/>
        <p className="text-zinc-500 text-sm">Loading...</p>
      </div>
    </div>
  );

  const totals = data?.totals || {calls:0, tokens:0, cost_yuan:0};
  const daily = data?.daily || [];
  const byProvider = data?.by_provider || {};
  const byModel = data?.by_model || {};
  const byTaskType = data?.by_task_type || {};
  const recent = data?.recent_calls || [];
  const routerStatus = data?.router_status || null;
  const stats = routerStatus?.stats || {};

  const avgLatency = recent.length > 0
    ? (recent.reduce((s,r) => s + (r.latency_ms||0), 0) / recent.length / 1000).toFixed(1)
    : '-';

  return (
    <div className="min-h-screen pb-12">
      {/* Header */}
      <header className="sticky top-0 z-50 backdrop-blur-xl bg-surface-0/80 border-b border-border">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <a href="/" className="text-zinc-500 hover:text-zinc-300 text-sm">&larr; Dashboard</a>
            <div className="w-px h-5 bg-border"/>
            <h1 className="text-lg font-bold text-zinc-100">API Usage Monitor</h1>
          </div>
          <div className="flex items-center gap-3">
            <select value={days} onChange={e => setDays(Number(e.target.value))}
              className="bg-surface-2 border border-border rounded-lg px-3 py-1.5 text-sm text-zinc-300 focus:outline-none focus:border-brand-500">
              <option value={7}>7 Days</option>
              <option value={14}>14 Days</option>
              <option value={30}>30 Days</option>
              <option value={60}>60 Days</option>
            </select>
            <button onClick={() => setAutoRefresh(!autoRefresh)}
              className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${autoRefresh ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'bg-surface-3 text-zinc-500 border border-border'}`}>
              {autoRefresh ? 'Auto 30s' : 'Paused'}
            </button>
            <button onClick={fetchData}
              className="px-3 py-1.5 rounded-lg text-xs font-medium bg-brand-500/10 text-brand-400 border border-brand-500/30 hover:bg-brand-500/20 transition-colors">
              Refresh
            </button>
          </div>
        </div>
      </header>

      {error && (
        <div className="max-w-7xl mx-auto px-6 mt-4">
          <div className="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-2 text-red-400 text-sm">{error}</div>
        </div>
      )}

      <main className="max-w-7xl mx-auto px-6 mt-6 space-y-6">
        {/* KPI Cards */}
        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
          <StatCard title="Total Calls" value={formatNumber(totals.calls)} icon="&#128200;" color="#818cf8"
            sub={`Fallbacks: ${stats.fallback_count||0}`}/>
          <StatCard title="Total Tokens" value={formatNumber(totals.tokens)} icon="&#9881;" color="#34d399"
            sub={`Avg: ${totals.calls > 0 ? formatNumber(Math.round(totals.tokens/totals.calls)) : '-'}/call`}/>
          <StatCard title="Total Cost" value={`¥${totals.cost_yuan?.toFixed(2)||'0.00'}`} icon="&#128176;" color="#f472b6"
            sub={`Avg: ¥${totals.calls > 0 ? (totals.cost_yuan/totals.calls).toFixed(4) : '-'}/call`}/>
          <StatCard title="Avg Latency" value={`${avgLatency}s`} icon="&#9201;" color="#fbbf24"
            sub={`${recent.length} recent calls`}/>
          <StatCard title="Error Rate" value={`${stats.total_calls > 0 ? ((stats.errors||0)/stats.total_calls*100).toFixed(1) : '0'}%`}
            icon="&#9888;" color={stats.errors > 0 ? '#ef4444' : '#34d399'}
            sub={`Errors: ${stats.errors||0} / Rate limits: ${stats.rate_limit_hits||0}`}/>
        </div>

        {/* Charts Row */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div className="card lg:col-span-2" style={{minHeight:'300px'}}>
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Daily Usage Trend</h3>
            <div style={{height:'250px'}}><DailyChart daily={daily}/></div>
          </div>
          <div className="card">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Provider Distribution</h3>
            <div style={{height:'250px'}}><ProviderChart byProvider={byProvider}/></div>
          </div>
        </div>

        {/* Model Distribution + Provider Stats */}
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          <div className="card">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Model Distribution</h3>
            <div style={{height:'260px'}}><ModelChart byModel={byModel}/></div>
          </div>
          <div className="card">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Model Details</h3>
            <ModelTable byModel={byModel} totals={totals}/>
          </div>
        </div>

        {/* Token & Provider Detail Row */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div className="card lg:col-span-2" style={{minHeight:'280px'}}>
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Token Consumption</h3>
            <div style={{height:'230px'}}><TokenChart daily={daily}/></div>
          </div>
          <div className="card">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Provider Stats</h3>
            <ProviderTable byProvider={byProvider} totals={totals}/>
          </div>
        </div>

        {/* Task Types + Router Status */}
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
          <div className="card">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Task Type Distribution</h3>
            <div className="space-y-3">
              {Object.entries(byTaskType).sort((a,b) => b[1]-a[1]).map(([type, cnt]) => {
                const total = Object.values(byTaskType).reduce((s,v) => s+v, 0);
                const pct = total > 0 ? (cnt/total*100).toFixed(1) : 0;
                return (
                  <div key={type}>
                    <div className="flex items-center justify-between text-xs mb-1">
                      <span className="font-medium" style={{color: TASK_COLORS[type]||'#a1a1aa'}}>{type}</span>
                      <span className="text-zinc-500">{cnt} ({pct}%)</span>
                    </div>
                    <div className="h-1.5 rounded-full bg-surface-4 overflow-hidden">
                      <div className="h-full rounded-full transition-all" style={{width:pct+'%', background: TASK_COLORS[type]||'#71717a'}}/>
                    </div>
                  </div>
                );
              })}
              {!Object.keys(byTaskType).length && <p className="text-zinc-600 text-xs">No data</p>}
            </div>
          </div>
          <div className="card lg:col-span-2">
            <h3 className="text-sm font-semibold text-zinc-300 mb-3">Router Status</h3>
            <RouterStatus status={routerStatus}/>
          </div>
        </div>

        {/* Recent Calls Log */}
        <div className="card">
          <div className="flex items-center justify-between mb-3">
            <h3 className="text-sm font-semibold text-zinc-300">API Call Log</h3>
          </div>
          <RecentTable records={recent} filter={logFilter} onFilterChange={setLogFilter}/>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
